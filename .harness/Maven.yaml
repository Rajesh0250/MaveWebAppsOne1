pipeline:
  name: Maven
  identifier: Maven
  projectIdentifier: default_project
  orgIdentifier: default
  stages:
    - stage:
        name: Test_build
        identifier: Test_build
        type: CI
        spec:
          cloneCodebase: false
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Hello
                  identifier: Run_1
                  spec:
                    shell: Sh
                    command: echo "hello"
              - step:
                  type: GitClone
                  name: GitClone
                  identifier: GitClone_1
                  spec:
                    connectorRef: Git_RK
                    cloneDirectory: MaveWebAppsOne1
                    build:
                      type: branch
                      spec:
                        branch: master
              - step:
                  type: Run
                  name: list_dir
                  identifier: Run_2
                  spec:
                    shell: Sh
                    command: |-
                      echo "Current directory:"
                      pwd

                      echo "Files in workspace:"
                      ls -la

                      echo "Files inside cloned repository:"
                      ls -la MaveWebAppsOne1
              - step:
                  type: Run
                  name: Build
                  identifier: Build
                  spec:
                    connectorRef: rajesh0250_Docker_reg
                    image: maven:3.9.9-eclipse-temurin-17
                    shell: Sh
                    command: |-
                      cd MaveWebAppsOne1
                      mvn clean test

                      mvn clean package

                      echo "Exit code: $?"

                      find . -maxdepth 2
              - step:
                  type: Run
                  name: list files
                  identifier: Run_4
                  spec:
                    shell: Sh
                    command: |-
                      cd MaveWebAppsOne1

                      echo "Project files:"
                      ls -la

                      echo "Target directory:"
                      ls -la target
              - step:
                  type: BuildAndPushDockerRegistry
                  name: BuildAndPushDockerRegistry
                  identifier: BuildAndPushDockerRegistry_1
                  spec:
                    connectorRef: rajesh0250_Docker_reg
                    repo: rajesh0250/harness
                    tags:
                      - <+codebase.branch>-<+pipeline.sequenceId>
                    dockerfile: MaveWebAppsOne1/Dockerfile
                    context: MaveWebAppsOne1
              - step:
                  type: Run
                  name: Build_Image
                  identifier: Build_Image
                  spec:
                    shell: Sh
                    command: |-
                      docker pull rajesh0250/harness:<+codebase.branch>-<+pipeline.sequenceId>

                      docker run -d \
                        --name harness-webapp \
                        -p 8080:8080 \
                        rajesh0250/harness:<+codebase.branch>-<+pipeline.sequenceId>
              - step:
                  type: Run
                  name: Access_application
                  identifier: Access_application
                  spec:
                    shell: Sh
                    command: |-
                      docker ps

                      curl http://localhost:8080
    - stage:
        name: approval
        identifier: approval
        description: ""
        type: Approval
        spec:
          execution:
            steps:
              - step:
                  type: CustomApproval
                  name: testapproval
                  identifier: testapproval
                  timeout: 1d
                  spec:
                    shell: Bash
                    retryInterval: 10s
                    scriptTimeout: 10m
                    source:
                      type: Inline
                      spec:
                        script: echo "Apporve"
                    environmentVariables: []
                    approvalCriteria:
                      type: KeyValues
                      spec:
                        matchAnyCondition: false
                        conditions:
                          - key: test
                            operator: equals
                            value: "1"
                    rejectionCriteria:
                      type: KeyValues
                      spec:
                        matchAnyCondition: false
                        conditions: []
                    onDelegate: true
                    outputVariables:
                      - name: Test
                        type: String
                        value: "1"
        tags: {}
