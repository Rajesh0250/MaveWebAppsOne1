pipeline:
  name: test-git
  identifier: test-git
  projectIdentifier: default_project
  orgIdentifier: default
  stages:
    - stage:
        name: Test_build
        identifier: Test_build
        type: CI
        spec:
          cloneCodebase: false
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Hello
                  identifier: Run_1
                  spec:
                    shell: Sh
                    command: echo "hello"
              - step:
                  type: GitClone
                  name: GitClone
                  identifier: GitClone_1
                  spec:
                    connectorRef: Git_RK
                    cloneDirectory: MaveWebAppsOne1
                    build:
                      type: branch
                      spec:
                        branch: master
              - step:
                  type: Run
                  name: list_dir
                  identifier: Run_2
                  spec:
                    shell: Sh
                    command: |-
                      echo "Current directory:"
                      pwd

                      echo "Files in workspace:"
                      ls -la

                      echo "Files inside cloned repository:"
                      ls -la MaveWebAppsOne1
              - parallel:
                  - step:
                      type: Run
                      name: Build
                      identifier: Build
                      spec:
                        connectorRef: rajesh0250_Docker_reg
                        image: maven:3.9.9-eclipse-temurin-17
                        shell: Sh
                        command: |-
                          cd MaveWebAppsOne1
                          mvn clean test

                          mvn clean package

                          echo "Exit code: $?"

                          find . -maxdepth 2
                  - step:
                      type: Test
                      name: Test_1
                      identifier: Test_1
                      spec:
                        shell: Sh
                        command: |-
                          cd MaveWebAppsOne1
                          mvn clean test

                          mvn clean package

                          echo "Exit code: $?"

                          find . -maxdepth 2
                        intelligenceMode: true
              - step:
                  type: Run
                  name: list files
                  identifier: Run_4
                  spec:
                    shell: Sh
                    command: |-
                      cd MaveWebAppsOne1

                      echo "Project files:"
                      ls -la

                      echo "Target directory:"
                      ls -la target
              - step:
                  type: BuildAndPushDockerRegistry
                  name: BuildAndPushDockerRegistry
                  identifier: BuildAndPushDockerRegistry_1
                  spec:
                    connectorRef: rajesh0250_Docker_reg
                    repo: rajesh0250/harness
                    tags:
                      - <+codebase.branch>-<+pipeline.sequenceId>
                    dockerfile: MaveWebAppsOne1/Dockerfile
                    context: MaveWebAppsOne1
              - parallel:
                  - step:
                      type: Run
                      name: Build_Image
                      identifier: Build_Image
                      spec:
                        shell: Sh
                        command: |-
                          docker pull rajesh0250/harness:<+codebase.branch>-<+pipeline.sequenceId>

                          docker run -d \
                            --name harness-webapp \
                            -p 8080:8080 \
                            rajesh0250/harness:<+codebase.branch>-<+pipeline.sequenceId>
                  - step:
                      type: AquaTrivy
                      name: AquaTrivy_1
                      identifier: AquaTrivy_1
                      spec:
                        mode: orchestration
                        config: default
                        target:
                          type: container
                          detection: auto
                        advanced:
                          log:
                            level: info
                        privileged: true
                        image:
                          type: docker_v2
                          tag: <+codebase.branch>-<+pipeline.sequenceId>
                          name: rajesh0250/harness
                          domain: index.docker.io
              - step:
                  type: Run
                  name: Access_application
                  identifier: Access_application
                  spec:
                    shell: Sh
                    command: |-
                      docker ps

                      curl http://localhost:8080
